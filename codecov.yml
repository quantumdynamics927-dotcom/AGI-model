# Codecov configuration for AGI-model
# https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: true
  branch: main
  token: 87b64133-c55c-4a4c-b134-4ff289cf8e94

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80%
        threshold: 5%
        branches:
          - main
    patch:
      default:
        target: 80%
        threshold: 5%

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes

github_checks:
  annotations: true

ignore:
  - "**/tests/**"
  - "**/test_*.py"
  - "**/__pycache__/**"
  - "**/migrations/**"
  - "**/*.md"