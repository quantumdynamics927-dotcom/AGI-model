# TMT-OS Production Configuration
version: '3.8'

services:
  # Main TMT-OS Quantum Consciousness Service
  tmt-os-api:
    image: tmt-os-quantum:latest
    container_name: tmt-os-api
    restart: unless-stopped
    environment:
      - TMT_OS_ENV=production
      - TMT_OS_HOST=0.0.0.0
      - TMT_OS_PORT=8000
      - TMT_OS_WORKERS=4
      - QISKIT_IBM_TOKEN=${QISKIT_IBM_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://tmtos:${POSTGRES_PASSWORD}@postgres:5432/tmt_os
      - PROMETHEUS_ENABLED=true
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - ./TMT-OS/data:/app/data
      - ./TMT-OS/logs:/app/logs
      - ./TMT-OS/cache:/app/cache
    depends_on:
      - redis
      - postgres
      - prometheus
    networks:
      - tmt-os-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit Dashboard
  tmt-os-dashboard:
    image: tmt-os-quantum:latest
    container_name: tmt-os-dashboard
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=false
      - STREAMLIT_SERVER_ENABLE_CORS=true
      - STREAMLIT_SERVER_ENABLE_WEBSOCKET_COMPRESSION=true
      - REDIS_URL=redis://redis:6379/0
      - TMT_OS_ENV=production
    ports:
      - "8501:8501"
    volumes:
      - ./TMT-OS/dashboard:/app/dashboard
      - ./TMT-OS/logs:/app/logs
    depends_on:
      - redis
      - tmt-os-api
    networks:
      - tmt-os-network
    command: ["streamlit", "run", "TMT-OS/dashboard/app.py"]

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tmt-os-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    networks:
      - tmt-os-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tmt-os-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=tmt_os
      - POSTGRES_USER=tmtos
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backup:/var/lib/postgresql/backup
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - tmt-os-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmtos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: tmt-os-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - tmt-os-network
    depends_on:
      - tmt-os-api

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: tmt-os-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SECURITY_CONTENT_TYPE_ANNOTATIONS=json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - tmt-os-network
    depends_on:
      - prometheus
    user: "472"

  # Nginx Load Balancer (Optional)
  nginx:
    image: nginx:alpine
    container_name: tmt-os-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - tmt-os-api
      - tmt-os-dashboard
    networks:
      - tmt-os-network
    profiles:
      - loadbalancer

  # Jaeger Tracing (Optional)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: tmt-os-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "6831:6831/udp"
      - "6832:6832/udp"
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
      - SPAN_STORAGE_TYPE=elasticsearch
      - ES_SERVER_URLS=http://elasticsearch:9200
    networks:
      - tmt-os-network
    profiles:
      - tracing

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  postgres_backup:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  tmt-os-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16