name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_agi_eval_smoke:
        description: 'Run AGI eval smoke via TMT Quantum Vault'
        required: false
        default: false
        type: boolean
      agi_eval_mode:
        description: 'Eval mode: cloud or local'
        required: false
        default: cloud
        type: choice
        options:
          - cloud
          - local
      agi_eval_model:
        description: 'Override model tag (e.g. qwen3-coder-next:cloud)'
        required: false
        default: qwen3-coder-next:cloud
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pytest requests; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest-cov pytest-junit
      
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd):$(pwd)/TMT-OS:$(pwd)/tmt-os-labs:$(pwd)/integrations:$(pwd)/agi_scripts:$(pwd)/agi_app:$(pwd)/agi_model:$(pwd)/quantum_observer" >> $GITHUB_ENV
      
      - name: Run tests with coverage
        run: pytest --cov --cov-branch --cov-report=xml --cov-report=html --junitxml=junit.xml -o junit_family=legacy -v
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
          flags: unittests

  ipfs_publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Publish sample metadata to Pinata
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_API_SECRET: ${{ secrets.PINATA_API_SECRET }}
        # NFT metadata publishing step DISABLED (on hold)
        run: echo "NFT publish step is currently disabled."

  agi_eval_smoke:
    name: vault-agi-eval-smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_agi_eval_smoke
    runs-on: ubuntu-latest
    env:
      AGI_EVAL_MODE: ${{ inputs.agi_eval_mode }}
      AGI_EVAL_MODEL: ${{ inputs.agi_eval_model }}
    steps:
      - name: Check out AGI-model
        uses: actions/checkout@v4

      - name: Check out TMT_Quantum_Vault
        uses: actions/checkout@v4
        with:
          repository: quantumdynamics927-dotcom/TMT_Quantum_Vault-
          token: ${{ secrets.TMT_VAULT_TOKEN }}
          path: tmt_vault

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install TMT Quantum Vault dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tmt_vault/requirements.txt

      - name: Preflight - validate Vault repository
        working-directory: tmt_vault
        run: python -m tmt_quantum_vault validate

      - name: Preflight - doctor runtime and repo health
        working-directory: tmt_vault
        run: python -m tmt_quantum_vault doctor --json

      - name: Run AGI eval smoke via TMT Vault agent-task
        working-directory: tmt_vault
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          if [ "${AGI_EVAL_MODE}" = "cloud" ] && [ -z "${OLLAMA_API_KEY}" ]; then
            echo "OLLAMA_API_KEY secret is required for cloud eval mode."
            exit 1
          fi
          mkdir -p ../.artifacts/vault-regression
          python -m tmt_quantum_vault agent-task \
            "Evaluate the AGI-model quantum VAE system. Mode=${AGI_EVAL_MODE}. Report fidelity, coherence, KL divergence, and overall health as a JSON object with keys: fidelity, coherence, kl_divergence, health_status." \
            --mode "${AGI_EVAL_MODE}" \
            --model "${AGI_EVAL_MODEL}" \
            --json --raw-final-only \
            > ../.artifacts/vault-regression/agi-eval-smoke.json

      - name: Write self-describing provenance artifact
        if: always()
        run: |
          mkdir -p .artifacts/vault-regression
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          provenance = {
            "run_id": os.environ.get("GITHUB_RUN_ID"),
            "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
            "sha": os.environ.get("GITHUB_SHA"),
            "ref": os.environ.get("GITHUB_REF"),
            "repository": os.environ.get("GITHUB_REPOSITORY"),
            "workflow": os.environ.get("GITHUB_WORKFLOW"),
            "job": "vault-agi-eval-smoke",
            "mode": os.environ.get("AGI_EVAL_MODE"),
            "model": os.environ.get("AGI_EVAL_MODEL"),
            "timestamp_utc": datetime.now(timezone.utc).isoformat()
          }
          with open(".artifacts/vault-regression/agi-eval-smoke-provenance.json", "w") as f:
              json.dump(provenance, f, indent=2)
          print(json.dumps(provenance, indent=2))
          PY
        env:
          AGI_EVAL_MODE: ${{ inputs.agi_eval_mode }}
          AGI_EVAL_MODEL: ${{ inputs.agi_eval_model }}

      - name: Copy eval dataset to artifacts
        if: always()
        run: |
          mkdir -p .artifacts/vault-regression
          if [ -f tmt_vault/evals/baseline.json ]; then
            cp tmt_vault/evals/baseline.json .artifacts/vault-regression/agi-eval-smoke-dataset.json
          else
            echo '{"note": "baseline.json not found in tmt_vault/evals/"}' \
              > .artifacts/vault-regression/agi-eval-smoke-dataset.json
          fi

      - name: Copy smoke result to artifacts
        if: always()
        run: |
          mkdir -p .artifacts/vault-regression
          if [ -f .artifacts/vault-regression/agi-eval-smoke.json ]; then
            echo "smoke result already in artifacts directory"
          else
            echo '{"note": "smoke step did not produce output"}' \
              > .artifacts/vault-regression/agi-eval-smoke.json
          fi

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agi-eval-smoke-failure-${{ github.run_number }}
          path: .artifacts/vault-regression/
          retention-days: 14

      - name: Upload smoke artifacts on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: agi-eval-smoke-${{ github.run_number }}
          path: .artifacts/vault-regression/
          retention-days: 30
