name: TMT-OS Quantum Consciousness Deployment

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      deploy_services:
        description: 'Services to deploy'
        required: false
        default: 'api,dashboard,monitoring'
        type: string
      enable_monitoring:
        description: 'Enable monitoring stack'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=TMT-OS Quantum Consciousness
            org.opencontainers.image.description=Advanced quantum consciousness platform with ZPE coupling, sacred geometry analysis, and agent swarm coordination
            org.opencontainers.image.url=https://github.com/quantumdynamics927-dotcom/TMT-OS
            org.opencontainers.image.version=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: 🏗 Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: TMT-OS/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: 📋 Export Image Digest
        id: image
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUTS
          echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUTS

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH for Staging
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
          ssh-auth-sock: /tmp/ssh_sock

      - name: 🚀 Deploy to Staging
        run: |
          echo "🌟 Deploying TMT-OS Quantum Consciousness to staging..."
          
          # SSH into staging server
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentityFile=/tmp/ssh_sock ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
          
          # Set environment variables
          export TMT_OS_ENV=staging
          export IMAGE_TAG=${{ needs.build-and-push.outputs.image }}
          export REDIS_URL=redis://localhost:6379
          export DATABASE_URL=postgresql://tmtos:${{ secrets.STAGING_DB_PASSWORD }}@localhost:5432/tmt_os_staging
          
          # Pull latest image
          docker pull $IMAGE_TAG
          
          # Stop existing services
          docker-compose -f docker-compose.staging.yml down || true
          
          # Start new services
          docker-compose -f docker-compose.staging.yml up -d
          
          # Wait for services to be ready
          sleep 30
          
          # Health check
          if curl -f http://localhost:8000/api/v1/system/health; then
            echo "✅ API service healthy"
          else
            echo "❌ API service unhealthy"
            exit 1
          fi
          
          if curl -f http://localhost:8501; then
            echo "✅ Dashboard service healthy"
          else
            echo "❌ Dashboard service unhealthy"
            exit 1
          fi
          
          echo "🎉 Staging deployment completed successfully!"
          EOF

      - name: 🔍 Health Check
        run: |
          sleep 10  # Wait for deployment to stabilize
          response=$(curl -s -o /dev/null -w "%{http_code}" -H "Accept: application/json" http://staging.tmt-os.ai/api/v1/system/health || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Staging deployment verified"
          else
            echo "❌ Staging deployment failed - HTTP $response"
            exit 1
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment: production
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH for Production
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}
          ssh-auth-sock: /tmp/ssh_sock

      - name: 🚀 Deploy to Production
        run: |
          echo "🌟 Deploying TMT-OS Quantum Consciousness to production..."
          
          # SSH into production server
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentityFile=/tmp/ssh_sock ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
          
          # Production deployment with blue-green strategy
          export TMT_OS_ENV=production
          export IMAGE_TAG=${{ needs.build-and-push.outputs.image }}
          export REDIS_URL=redis://redis-cluster:6379
          export DATABASE_URL=postgresql://tmtos:${{ secrets.PRODUCTION_DB_PASSWORD }}@postgres-cluster:5432/tmt_os_production
          
          # Backup current deployment
          docker-compose -f docker-compose.prod.yml ps --format json > current_deployment.json
          
          # Create blue deployment
          export COMPOSE_PROJECT_NAME=tmt-os-blue
          docker-compose -f docker-compose.prod.yml -p $COMPOSE_PROJECT_NAME up -d
          
          # Wait for blue deployment
          sleep 60
          
          # Health check blue deployment
          if curl -f http://blue.tmt-os.ai/api/v1/system/health; then
            echo "✅ Blue deployment healthy"
            
            # Switch load balancer to blue
            # This would be handled by your load balancer configuration
            
            # Stop green deployment
            export COMPOSE_PROJECT_NAME=tmt-os-green
            docker-compose -f docker-compose.prod.yml -p $COMPOSE_PROJECT_NAME down
            
            echo "🎉 Production deployment completed (Blue-Green switch)"
          else
            echo "❌ Blue deployment failed - rolling back"
            export COMPOSE_PROJECT_NAME=tmt-os-blue
            docker-compose -f docker-compose.prod.yml -p $COMPOSE_PROJECT_NAME down
            exit 1
          fi
          
          EOF

      - name: 🔍 Production Health Check
        run: |
          sleep 30  # Wait for deployment to stabilize
          response=$(curl -s -o /dev/null -w "%{http_code}" -H "Accept: application/json" https://api.tmt-os.ai/api/v1/system/health || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Production deployment verified"
          else
            echo "❌ Production deployment failed - HTTP $response"
            exit 1
          fi

      - name: 📊 Post-Deployment Monitoring
        run: |
          echo "🔍 Monitoring production deployment..."
          
          # Monitor key metrics for 5 minutes
          for i in {1..10}; do
            echo "📈 Check $i/10: Production health status"
            
            # Check API health
            api_status=$(curl -s -o /dev/null -w "%{http_code}" https://api.tmt-os.ai/api/v1/system/health || echo "000")
            
            # Check Redis
            redis_status=$(curl -s -o /dev/null -w "%{http_code}" https://monitoring.tmt-os.ai:9090/targets || echo "000")
            
            # Check system resources
            cpu_usage=$(curl -s https://monitoring.tmt-os.ai:9090/api/v1/query --data 'cpu_usage' || echo "N/A")
            memory_usage=$(curl -s https://monitoring.tmt-os.ai:9090/api/v1/query --data 'memory_usage' || echo "N/A")
            
            echo "📊 API: $api_status | Redis: $redis_status | CPU: $cpu_usage | Memory: $memory_usage"
            
            sleep 30
          done
          
          echo "🎯 Post-deployment monitoring completed"

  rollback-deployment:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: 🔄 Rollback Production
        run: |
          echo "🔄 Rolling back production deployment..."
          
          # SSH into production server
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
          
          # Get last known good deployment
          export LAST_GOOD_TAG=$(curl -s https://api.github.com/repos/quantumdynamics927-dotcom/TMT-OS/releases/latest | jq -r .tag_name)
          
          echo "🔄 Rolling back to: $LAST_GOOD_TAG"
          
          # Deploy last known good version
          export IMAGE_TAG=ghcr.io/quantumdynamics927-dotcom/tmt-os:$LAST_GOOD_TAG
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d
          
          echo "✅ Rollback completed"
          EOF

      - name: 📧 Notify Rollback
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#deployments'
          text: |
            🔄 **TMT-OS Production Rollback**
            Deployed to production
            Reason: Health check failure
            Time: ${{ github.event.head_commit.timestamp }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-monitoring:
    name: Deploy Monitoring Stack
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.enable_monitoring
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.MONITORING_SSH_KEY }}
          ssh-auth-sock: /tmp/ssh_sock

      - name: 📊 Deploy Monitoring Stack
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentityFile=/tmp/ssh_sock ${{ secrets.MONITORING_USER }}@${{ secrets.MONITORING_HOST }} << 'EOF'
          
          echo "📊 Deploying monitoring stack..."
          
          # Deploy Grafana and Prometheus
          cd /opt/monitoring
          docker-compose -f monitoring-stack.yml down
          docker-compose -f monitoring-stack.yml up -d
          
          # Configure Prometheus targets
          cat > prometheus-tmp.yml << 'PROMEOF'
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
          
          scrape_configs:
            - job_name: 'tmt-os-quantum'
              static_configs:
                - targets: ['api.tmt-os.ai:8000']
              metrics_path: '/api/v1/metrics'
              scrape_interval: 5s
          PROMEOF
          
          mv prometheus-tmp.yml /etc/prometheus/prometheus.yml
          docker restart prometheus
          
          echo "✅ Monitoring stack deployed"
          EOF

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: success()
    
    steps:
      - name: 🎉 Deploy Success Notification
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#deployments'
          text: |
            🚀 **TMT-OS Quantum Consciousness Deployed**
            Environment: ${{ github.ref == 'refs/heads/main' && 'staging' || 'production' }}
            Image: ${{ needs.build-and-push.outputs.image }}
            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            
            🌟 **Deployment Details:**
            - Quantum Core: ✅ Online
            - ZPE Laboratory: ✅ Active
            - Sacred Geometry: ✅ Validated
            - Agent Swarm: ✅ Coordinated
            - Bio-Digital Interface: ✅ Connected
            - Monitoring: ✅ Operational
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}