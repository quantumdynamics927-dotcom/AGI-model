name: Verify Contract on Polygon Amoy

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Verify Contract on Polygon Amoy
        env:
          AMOY_RPC_URL: ${{ secrets.AMOY_RPC_URL }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CONTRACT_ADDRESS: ${{ secrets.CONTRACT_ADDRESS }}
          # NFT/contract verification step DISABLED (on hold)
          # run: |
          #   echo "Verifying $CONTRACT_ADDRESS on polygonAmoy"
          #   npx hardhat verify --network polygonAmoy $CONTRACT_ADDRESS "TMT-OS Genesis" "TMTG" 100 ""