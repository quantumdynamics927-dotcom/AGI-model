name: Security Scanning

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC
  push:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - '**.yml'
      - '**.yaml'
      - '**.json'
      - '**.sh'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - '**.yml'
      - '**.yaml'
      - '**.json'
      - '**.sh'
  workflow_dispatch:

jobs:
  code-security-scan:
    name: Code Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🔧 Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety semgrep

      - name: 🔍 Bandit Security Scan
        run: |
          echo "🔍 Running Bandit security analysis..."
          bandit -r . -f json -o bandit-report.json --exclude ./.venv,./.git,./node_modules || true

          # Check for high severity issues
          if [ -f bandit-report.json ]; then
            high_issues=$(jq '.results | map(select(.issue_severity == "HIGH")) | length' bandit-report.json)
            if [ "$high_issues" -gt 0 ]; then
              echo "⚠️ Found $high_issues high severity security issues"
              jq '.results | map(select(.issue_severity == "HIGH"))' bandit-report.json
            else
              echo "✅ No high severity issues found"
            fi
          fi

      - name: 🔒 Safety Vulnerability Scan
        run: |
          echo "🔒 Running Safety vulnerability scan..."
          safety check --json --output safety-report.json || true

          # Check for vulnerable packages
          if [ -f safety-report.json ]; then
            vuln_count=$(jq 'length' safety-report.json)
            if [ "$vuln_count" -gt 0 ]; then
              echo "⚠️ Found $vuln_count vulnerable packages"
              cat safety-report.json
            else
              echo "✅ No known vulnerabilities found"
            fi
          fi

      - name: 🕵️ Semgrep Security Analysis
        run: |
          echo "🕵️ Running Semgrep security analysis..."
          semgrep --config=auto --json --output=semgrep-report.json . || true

          # Check for findings
          if [ -f semgrep-report.json ]; then
            finding_count=$(jq '.results | length' semgrep-report.json)
            if [ "$finding_count" -gt 0 ]; then
              echo "⚠️ Found $finding_count security findings"
              jq '.results' semgrep-report.json
            else
              echo "✅ No security findings detected"
            fi
          fi

      - name: 📊 Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_number }}
          path: |
            bandit-report.json
            safety-report.json
            semgrep-report.json
          retention-days: 30

  dependency-security-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🔍 Dependency Security Audit
        run: |
          # Check for vulnerable dependencies
          echo "🔍 Auditing Python dependencies..."
          pip install --upgrade pip
          pip install -r requirements.txt
          pip list --outdated

          # Run pip-audit for CVE scanning
          pip install pip-audit
          pip-audit --format json --output pip-audit-report.json || true

          if [ -f pip-audit-report.json ]; then
            vuln_count=$(jq 'length' pip-audit-report.json)
            if [ "$vuln_count" -gt 0 ]; then
              echo "⚠️ Found $vuln_count vulnerable dependencies"
              cat pip-audit-report.json
            else
              echo "✅ No vulnerable dependencies found"
            fi
          fi

      - name: 📊 Upload Dependency Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-reports-${{ github.run_number }}
          path: pip-audit-report.json
          retention-days: 30

  container-security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Trivy Security Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
          ignore-unfixed: true

      - name: 📊 Upload Trivy Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report-${{ github.run_number }}
          path: trivy-results.sarif
          retention-days: 30

      - name: 📋 Trivy Summary
        run: |
          if [ -f trivy-results.sarif ]; then
            echo "📋 Trivy Security Scan Summary:"
            # Parse SARIF results
            jq '.runs[].results[] | {ruleId: .ruleId, message: .message.text, level: .level}' trivy-results.sarif || true
          fi

  docker-security-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗 Build Docker Image for Scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: tmt-os-quantum:local

      - name: 🔍 Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tmt-os-quantum:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-docker-results.txt'
          ignorefile: '.trivyignore'
        continue-on-error: true

      - name: 📊 Upload Docker Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-docker-scan-${{ github.run_number }}
          path: trivy-docker-results.txt
          retention-days: 30

      - name: 🔍 Check for Critical Vulnerabilities
        run: |
          if [ -f trivy-docker-results.txt ]; then
            # Count CRITICAL and HIGH vulnerabilities
            critical_count=$(grep -c "CRITICAL" trivy-docker-results.txt || echo "0")
            high_count=$(grep -c "HIGH" trivy-docker-results.txt || echo "0")
            
            echo "📊 Vulnerability Summary:"
            echo "  CRITICAL: $critical_count"
            echo "  HIGH: $high_count"
            
            # Fail only on CRITICAL vulnerabilities
            if [ "$critical_count" -gt 0 ]; then
              echo "❌ Found $critical_count CRITICAL vulnerabilities - failing build"
              exit 1
            else
              echo "✅ No CRITICAL vulnerabilities found"
              echo "⚠️ Found $high_count HIGH severity vulnerabilities - review recommended"
            fi
          fi

  notify-security-findings:
    name: Notify Security Findings
    runs-on: ubuntu-latest
    needs: [code-security-scan, dependency-security-scan, container-security-scan]
    if: failure()

    steps:
      - name: ⚠️ Security Alert Notification
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#security'
          text: |
            ⚠️ **Security Alert for TMT-OS Quantum Consciousness**

            Security scanning workflow detected potential vulnerabilities:
            - Code Security Issues: ${{ needs.code-security-scan.result }}
            - Dependency Vulnerabilities: ${{ needs.dependency-security-scan.result }}
            - Container Security Issues: ${{ needs.container-security-scan.result }}

            Please review the security reports and address any identified issues.

            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  security-summary:
    name: Security Summary Report
    runs-on: ubuntu-latest
    needs: [code-security-scan, dependency-security-scan, container-security-scan]
    if: always()

    steps:
      - name: 📥 Download Security Reports
        uses: actions/download-artifact@v4
        with:
          pattern: '*-reports-*'
          merge-multiple: true

      - name: 📊 Generate Security Summary
        run: |
          echo "📊 Security Scan Summary Report"
          echo "==============================="
          echo ""

          # Bandit report summary
          if [ -f bandit-report.json ]; then
            echo "🔍 Bandit Security Analysis:"
            high=$(jq '.results | map(select(.issue_severity == "HIGH")) | length' bandit-report.json)
            medium=$(jq '.results | map(select(.issue_severity == "MEDIUM")) | length' bandit-report.json)
            low=$(jq '.results | map(select(.issue_severity == "LOW")) | length' bandit-report.json)
            echo "   HIGH: $high issues"
            echo "   MEDIUM: $medium issues"
            echo "   LOW: $low issues"
            echo ""
          fi

          # Safety report summary
          if [ -f safety-report.json ]; then
            echo "🔒 Safety Vulnerability Scan:"
            vulns=$(jq 'length' safety-report.json)
            echo "   Vulnerable packages: $vulns"
            echo ""
          fi

          # Semgrep report summary
          if [ -f semgrep-report.json ]; then
            echo "🕵️ Semgrep Security Analysis:"
            findings=$(jq '.results | length' semgrep-report.json)
            echo "   Security findings: $findings"
            echo ""
          fi

          echo "✅ Security scanning workflow completed"