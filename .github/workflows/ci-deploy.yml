name: CI & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install requests-mock
      - name: Run Python tests
        run: |
          python -m pytest -q

  hardhat-tests:
    runs-on: ubuntu-latest
    # Only run if hardhat.config.js exists (smart contract tests)
    if: hashFiles('hardhat.config.js', 'hardhat.config.ts') != ''
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: |
          npm ci || npm install
      - name: Run Hardhat tests
        run: |
          npx hardhat test

  deploy-mumbai:
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [test]
    env:
      ALCHEMY_MUMBAI_URL: ${{ secrets.ALCHEMY_MUMBAI_URL }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
      PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
      PINATA_SECRET: ${{ secrets.PINATA_SECRET }}
      PINATA_JWT: ${{ secrets.PINATA_JWT }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Deploy
        run: |
          npm ci || npm install
          npx hardhat run --network mumbai scripts/deploy.js
      - name: Test Pinata credentials
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          echo "Testing Pinata authentication"
          set -e
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $PINATA_JWT" https://api.pinata.cloud/data/testAuthentication)
          echo "Pinata auth returned HTTP status $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Pinata authentication failed" >&2
            exit 1
          fi
      - name: Verify contract on Polygonscan
        env:
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: |
          echo "Looking for deployment file..."
          if [ -f deployments/mumbai-TMTGenesis.json ]; then
            CONTRACT_ADDRESS=$(node -e "console.log(require('./deployments/mumbai-TMTGenesis.json').address)")
            echo "Found contract: $CONTRACT_ADDRESS"
            npx hardhat verify --network mumbai $CONTRACT_ADDRESS "TMT-OS Genesis" "TMTG" 100 ""
          else
            echo "Deployment file not found; skipping verify"
          fi
